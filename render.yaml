services:
  # 后端服务（同时 serve 前端静态文件 + SQLite 持久化）
  - type: web
    name: geo-backend
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: |
      cd ../frontend && npm install && npm run build && cd ../backend && npm install && npm run build && mkdir -p public && cp -r ../frontend/dist/* public/
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        value: "*"
      - key: JWT_SECRET
        generateValue: true
      - key: AI_API_KEY
        sync: false
      - key: AI_BASE_URL
        value: https://zenmux.ai/api/v1
      - key: AI_MODEL
        value: deepseek/deepseek-v4-pro
      - key: APP_MODE
        value: enterprise
    disk:
      name: geo-data
      mountPath: /opt/render/project/src/
      sizeGB: 1