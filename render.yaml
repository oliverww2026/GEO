services:
  # 后端服务（同时 serve 前端静态文件 + SQLite 持久化存储）
  - type: web
    name: geo-backend
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: |
      echo "=== 安装后端依赖 ===" &&
      npm install --production=false &&
      echo "=== 构建后端 ===" &&
      npm run build &&
      echo "=== 安装前端依赖 ===" &&
      cd ../frontend && npm install &&
      echo "=== 构建前端 ===" &&
      npx vite build &&
      echo "=== 复制前端构建产物 ===" &&
      mkdir -p ../backend/public && cp -r dist/* ../backend/public/
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: CORS_ORIGINS
        value: "*"
      - key: DB_PATH
        value: /data/geo.db
      - key: JWT_SECRET
        generateValue: true
      - key: AI_API_KEY
        sync: false
      - key: AI_BASE_URL
        value: https://zenmux.ai/api/v1
      - key: AI_MODEL
        value: deepseek/deepseek-v4-pro
      - key: APP_MODE
        value: enterprise